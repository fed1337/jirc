name: CI

on:
  push:
    branches: [ master ]

permissions:
  contents: write
  pull-requests: read

# a newer push cancels an in-flight run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Compile
        run: |
          find src -name '*.java' > sources.txt
          mkdir -p build/classes
          javac -encoding UTF-8 -source 8 -target 8 -Xlint:all -d build/classes @sources.txt
          cp -r resources/. build/classes/

      - name: Package jar
        run: jar cfe jirc.jar org.jirc.Main -C build/classes .

      - name: Verify jar contents
        run: |
          echo "Entry point + key resources present:"
          jar tf jirc.jar | grep -E 'org/jirc/App.class|org/jirc/version.properties|cpqma-|HpqKbHook-|jirc_strings.xml'

  release:
    needs: build
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Create bump and changelog
        id: cz
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog_increment_filename: body.md

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Compile
        run: |
          find src -name '*.java' > sources.txt
          mkdir -p build/classes
          javac -encoding UTF-8 -source 8 -target 8 -Xlint:all -d build/classes @sources.txt
          cp -r resources/. build/classes/

      - name: Package jar
        run: jar cfe jirc.jar org.jirc.Main -C build/classes .

      - name: Verify jar contains bumped version
        run: |
          jar xf jirc.jar org/jirc/version.properties
          grep "^version=${{ steps.cz.outputs.version }}$" org/jirc/version.properties

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: body.md
          tag_name: v${{ steps.cz.outputs.version }}
          files: jirc.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
